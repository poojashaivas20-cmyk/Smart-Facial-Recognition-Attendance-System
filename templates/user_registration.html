{% extends "layout.html" %}

{% block auth_content %}
<div class="auth-card" style="max-width: 500px;">
    <div style="margin-bottom: 2rem;">
        <i class="fas fa-user-plus" style="font-size: 3rem; color: var(--primary);"></i>
        <h1 class="auth-title">User Registration</h1>
        <p class="auth-subtitle">Create your account to access the system</p>
    </div>

    <form id="reg-form">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="fullname" class="form-control" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" class="form-control" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" class="form-control" placeholder="Create a password" required>
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirm_password" class="form-control" placeholder="Confirm your password" required>
        </div>

        <button type="submit" class="btn-auth">
            <i class="fas fa-user-check"></i> Register
        </button>
    </form>

    <p style="margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
        Already have an account? <a href="/login" style="color: var(--primary); font-weight: 600; text-decoration: none;">Login here</a>
    </p>
</div>

<script>
    document.getElementById('reg-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fullname = document.getElementById('fullname').value;
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm_password').value;

        if (password !== confirm) {
            alert("Passwords do not match!");
            return;
        }

        const response = await fetch('/api/user_registration', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fullname, username, password })
        });
        const result = await response.json();
        
        if (result.success) {
            alert("Registration successful! Please login.");
            window.location.href = '/login';
        } else {
            alert(result.message);
        }
    });
</script>
{% endblock %}
