{% extends "layout.html" %}

{% block auth_content %}
<div class="auth-card">
    <div style="margin-bottom: 2rem;">
        <i class="fas fa-graduation-cap" style="font-size: 3rem; color: var(--primary);"></i>
        <h1 class="auth-title">Attendance System</h1>
        <p class="auth-subtitle">Face Recognition-Based Student Attendance</p>
    </div>

    <h2 style="font-size: 1.25rem; font-weight: 600; margin-bottom: 1.5rem;">Login to your account</h2>

    <form id="login-form">
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" class="form-control" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn-auth">
            <i class="fas fa-sign-in-alt"></i> Login
        </button>
    </form>

    <div style="margin: 1.5rem 0; color: var(--text-muted); font-size: 0.8rem;">OR</div>

    <button id="face-login-btn" class="btn-auth" style="background: var(--success);">
        <i class="fas fa-user-shield"></i> Login with Face
    </button>

    <p style="margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
        Don't have an account? <a href="/user_registration" style="color: var(--primary); font-weight: 600; text-decoration: none;">Register here</a>
    </p>

    <!-- Hidden Video for Face Login -->
    <div id="face-login-container" style="display:none; margin-top: 1rem;">
        <video id="video-login" autoplay muted style="width: 100%; border-radius: 12px;"></video>
        <p id="login-status" style="margin-top: 0.5rem; font-size: 0.8rem;"></p>
    </div>
</div>

<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const result = await response.json();
        
        if (result.success) {
            window.location.href = '/dashboard';
        } else {
            alert(result.message);
        }
    });

    // Face Login Trigger
    document.getElementById('face-login-btn').addEventListener('click', async () => {
        const container = document.getElementById('face-login-container');
        container.style.display = 'block';
        // JS logic will be handled in main.js
    });
</script>
{% endblock %}
