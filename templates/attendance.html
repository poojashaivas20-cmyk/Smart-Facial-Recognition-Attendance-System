{% extends "layout.html" %}

{% block content %}
<div class="kiosk-body">
    <!-- KIOSK HEADER -->
    <div class="kiosk-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div style="background: var(--primary); padding: 10px; border-radius: 12px;">
                <i class="fas fa-user-check" style="font-size: 1.5rem; color: white;"></i>
            </div>
            <div>
                <h2 style="margin:0; font-weight: 800; letter-spacing: -0.5px;">Student Attendance Kiosk</h2>
                <p style="margin:0; font-size: 0.8rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px;">Smart Face Recognition System</p>
            </div>
        </div>
        <div id="kiosk-clock" style="font-size: 1.2rem; font-weight: 700; color: var(--primary);">
            00:00:00 PM
        </div>
        <a href="/login" style="color: rgba(255,255,255,0.3); text-decoration: none; font-size: 0.8rem;">
            <i class="fas fa-lock"></i> Admin Portal
        </a>
    </div>

    <!-- MAIN KIOSK CONTAINER -->
    <div class="kiosk-container">
        <div id="cam-wrapper" class="kiosk-video-wrapper">
            <video id="video" autoplay muted class="kiosk-video"></video>
            <div class="kiosk-overlay">
                <div class="kiosk-scanner-line" id="scan-line"></div>
                <div style="text-align: center; margin-top: auto; padding-bottom: 2rem;">
                    <p id="instruction-text" style="background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 30px; display: inline-block; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px);">
                        Looking for face...
                    </p>
                </div>
            </div>
            <canvas id="snapshot-canvas" style="display: none;"></canvas>
        </div>

        <div class="kiosk-status-panel">
            <div id="status-container">
                <div class="kiosk-message" style="opacity: 0.5;">READY TO SCAN</div>
                <div class="kiosk-sub-message">Position your face within the frame</div>
            </div>
        </div>
    </div>
</div>

<!-- SUCCESS BEEP -->
<audio id="success-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<style>
    /* Hide default sidebar/header if they exist in layout */
    .sidebar, .dashboard-header { display: none !important; }
    .main-area { margin-left: 0 !important; }
    .content-padding { padding: 0 !important; }
</style>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('snapshot-canvas');
    const statusContainer = document.getElementById('status-container');
    const camWrapper = document.getElementById('cam-wrapper');
    const scanLine = document.getElementById('scan-line');
    const successSound = document.getElementById('success-sound');
    
    let isProcessing = false;

    // 1. Initialize Webcam
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
            video.srcObject = stream;
        } catch (err) {
            console.error("Camera Error:", err);
            statusContainer.innerHTML = `<div class="kiosk-message" style="color: var(--danger)">CAMERA ERROR</div>
                                        <div class="kiosk-sub-message">Please check your camera permissions</div>`;
        }
    }

    // 2. Capture and Recognize (Continuous Loop)
    async function processFrame() {
        if (isProcessing) return;

        // Draw current frame to hidden canvas
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const imageData = canvas.toDataURL('image/jpeg', 0.8);

        isProcessing = true;
        
        try {
            const response = await fetch('/mark_attendance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData })
            });
            const result = await response.json();

            if (result.success && result.marked && result.marked.length > 0) {
                showSuccess(result.marked[0]);
            } else if (result.success === false && (result.message.includes('PROXY') || result.message.includes('Detected') || result.message.includes('Clarity'))) {
                showProxyWarning(result.message);
            } else {
                // If no match, continue scanning quickly
                isProcessing = false;
            }
        } catch (err) {
            console.error("API Error:", err);
            isProcessing = false;
        }
    }

    function showSuccess(name) {
        // Feedback State
        camWrapper.classList.add('success');
        successSound.play();
        
        statusContainer.innerHTML = `
            <div class="kiosk-success-card">
                <i class="fas fa-check-circle" style="font-size: 2rem;"></i>
                <div style="text-align: left;">
                    <div style="font-size: 0.8rem; text-transform: uppercase; font-weight: 700; opacity: 0.8;">Attendance Marked</div>
                    <div style="font-size: 1.5rem; font-weight: 800;">Welcome, ${name}</div>
                </div>
            </div>
        `;

        // Wait for 2.5 seconds then reset for next student
        setTimeout(() => {
            camWrapper.classList.remove('success');
            statusContainer.innerHTML = `
                <div class="kiosk-message" style="opacity: 0.5;">READY TO SCAN</div>
                <div class="kiosk-sub-message">Position your face within the frame</div>
            `;
            isProcessing = false;
        }, 2500);
    }

    function showProxyWarning(msg) {
        // Warning State
        camWrapper.classList.add('error');
        
        statusContainer.innerHTML = `
            <div class="kiosk-success-card" style="background: var(--danger); max-width: 90%; padding: 1.5rem 2rem;">
                <i class="fas fa-shield-alt" style="font-size: 2rem;"></i>
                <div style="text-align: left;">
                    <div style="font-size: 0.8rem; text-transform: uppercase; font-weight: 700; opacity: 0.8;">Security Alert</div>
                    <div style="font-size: 1.2rem; font-weight: 800; line-height: 1.2;">${msg}</div>
                </div>
            </div>
        `;

        setTimeout(() => {
            camWrapper.classList.remove('error');
            statusContainer.innerHTML = `
                <div class="kiosk-message" style="opacity: 0.5;">READY TO SCAN</div>
                <div class="kiosk-sub-message">Position your face within the frame</div>
            `;
            isProcessing = false;
        }, 3000);
    }

    // 3. Keep Clock Updated
    setInterval(() => {
        const now = new Date();
        document.getElementById('kiosk-clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }, 1000);

    // Initial Start
    startCamera();
    
    // Scan every 800ms when ready
    setInterval(() => {
        if (!isProcessing) processFrame();
    }, 800);

    // Hide Page Title (handled by script in layout usually)
    document.getElementById('page-title').innerText = "Kiosk View";
</script>
{% endblock %}
